version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: superdo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       superdo_ai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./superdo-ai-backend
      dockerfile: Dockerfile
    container_name: superdo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL:                   jdbc:postgresql://postgres:5432/superdo_ai
      DB_USERNAME:              postgres
      DB_PASSWORD:              ${DB_PASSWORD:-changeme}
      DB_SSL_ENABLED:           "false"
      JWT_SECRET:               ${JWT_SECRET:-change-this-to-a-long-secure-secret-in-production}
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS:-http://localhost}
      GOOGLE_CLIENT_ID:         ${GOOGLE_CLIENT_ID:-}
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      ADMIN_EMAILS:             ${ADMIN_EMAILS:-}
      REFRESH_COOKIE_SECURE:    ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-Lax}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/auth/config || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Static Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./superdo-ai-frontend
      dockerfile: Dockerfile
    container_name: superdo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
